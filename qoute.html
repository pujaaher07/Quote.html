<!DOCTYPE html>
<html>
<head>
    <title>Random Quote Generator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }
        #quoteBox {
            background: white;
            padding: 20px;
            width: 50%;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="quoteBox">
        <h2 id="quote">Click button to get quote</h2>
        <p id="author"></p>
        <button onclick="newQuote()">New Quote</button>
    </div>

    <script>
        const quotes = [
            {text: "Believe in yourself", author: "Unknown"},
            {text: "Stay positive, work hard", author: "Unknown"},
            {text: "Success is not final", author: "Winston Churchill"},
            {text: "Dream big and dare to fail", author: "Norman Vaughan"}
        ];

        function newQuote() {
            let random = Math.floor(Math.random() * quotes.length);
            document.getElementById("quote").innerText = quotes[random].text;
            document.getElementById("author").innerText = "- " + quotes[random].author;
        }
    </script>

</body>
</html>
